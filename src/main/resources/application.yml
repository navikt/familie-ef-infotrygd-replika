# Felles variabler
NAIS_APP_NAME: familie-ef-infotrygd-replika
DEPLOY_ENV: dev

# Spring konfigurasjon
spring:
  application:
    name: familie-ef-infotrygd-replika

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_OPENID_CONFIG_ISSUER}
          audiences: ${AZURE_APP_CLIENT_ID}
      # Client credentials mot historisk-exodus (on-prem), se ExodusClientConfig.
      client:
        registration:
          exodus:
            provider: azure
            authorization-grant-type: client_credentials
            client-id: ${AZURE_APP_CLIENT_ID}
            client-secret: ${AZURE_APP_CLIENT_SECRET}
            scope: ${EXODUS_SCOPE}
        provider:
          azure:
            token-uri: ${AZURE_OPENID_CONFIG_TOKEN_ENDPOINT}

  # Database konfigurasjon (Postgres/Cloud SQL på GCP)
  datasource:
    url: ${DB_JDBC_URL}
    hikari:
      maximum-pool-size: 20
      connection-test-query: "select 1"
      max-lifetime: 90000
      minimum-idle: 1

  # Flyway migrerer skjemaet, se src/main/resources/db/migration
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ddl-auto er alltid none - skjemaet eies og migreres av flyway, ikke hibernate
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

springdoc:
  packagesToScan: no.nav.familie.ef.infotrygd.replika
  pathsToMatch: /v3/api-docs,/api/**
  swagger-ui:
    disable-swagger-default-url: true


# Management og health endepunkter
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
      base-path: /internal

# Azure AD konfigurasjon
azure:
  app:
    tenant:
      id: ${AZURE_APP_TENANT_ID}
    client:
      id: ${AZURE_APP_CLIENT_ID}
      secret: ${AZURE_APP_CLIENT_SECRET}

# Klient mot historisk-exodus (replikering av statiske Infotrygd-tabeller on-prem -> GCP)
exodus:
  base-url: ${EXODUS_BASE_URL}
  batch-storrelse: 1000
  scheduler-cron: 0 */5 * * * *
  maks-sider-per-kjoring: 500
