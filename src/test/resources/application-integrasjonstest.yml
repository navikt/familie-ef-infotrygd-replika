# Integrasjonstest konfigurasjon
# Kjører mot ekte Postgres via Testcontainers - samme Flyway-migrering som prod

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:17:///testdb
    username: test
    password: test
    hikari:
      maximum-pool-size: 3
      connection-test-query: "select 1"
      max-lifetime: 900000
      minimum-idle: 1
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/test-tenant-id/v2.0
          jwk-set-uri: https://login.microsoftonline.com/test-tenant-id/discovery/v2.0/keys
          audiences: test-client-id

# Azure AD konfigurasjon (mock-verdier for tester)
azure:
  app:
    tenant:
      id: test-tenant-id
    client:
      id: test-client-id
      secret: test-client-secret
